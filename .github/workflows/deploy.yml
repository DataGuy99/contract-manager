# Optional: if repo Settings->Pages->Source is switched to "GitHub Actions",
# this builds app/ and deploys automatically. Until then, Pages serves the
# committed build at repo root (legacy branch mode) — rebuild locally:
#   cd app && GH_PAGES=1 npm run build && cp -r dist/* ../
name: Deploy to GitHub Pages
on: { push: { branches: [main] } }
permissions: { contents: read, pages: write, id-token: write }
jobs:
  build:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: app } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: GH_PAGES=1 npm run build
      - uses: actions/upload-pages-artifact@v3
        with: { path: app/dist }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: { name: github-pages, url: ${{ steps.deployment.outputs.page_url }} }
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
